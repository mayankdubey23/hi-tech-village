<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Property Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #050505;
            --accent-gold: #D4AF37;
            --surface-color: rgba(255, 255, 255, 0.03);
            --border-color: rgba(212, 175, 55, 0.2);
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.1), transparent 50%);
        }

        .form-wrapper {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 50px;
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(30px);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
        }

        h2 {
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-weight: 300;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            position: relative;
            opacity: 0;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group select option {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .form-group label {
            position: absolute;
            top: 12px;
            left: 0;
            color: var(--text-muted);
            pointer-events: none;
            transition: 0.3s ease all;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group input:valid,
        .form-group textarea:focus,
        .form-group textarea:valid,
        .form-group select:focus,
        .form-group select:valid {
            outline: none;
            border-bottom-color: var(--accent-gold);
        }

        .form-group input:focus~label,
        .form-group input:valid~label,
        .form-group textarea:focus~label,
        .form-group textarea:valid~label,
        .form-group select:focus~label,
        .form-group select:valid~label {
            top: -15px;
            font-size: 0.75rem;
            color: var(--accent-gold);
        }

        button.submit-btn {
            grid-column: 1 / -1;
            margin-top: 20px;
            padding: 18px;
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            opacity: 0;
        }

        button.submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-gold);
            z-index: -1;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        button.submit-btn:hover {
            color: var(--bg-dark);
        }

        button.submit-btn:hover::before {
            transform: scaleX(1);
        }

        #successMessage {
            display: none;
            text-align: center;
            color: var(--accent-gold);
            font-family: 'Syncopate', sans-serif;
            grid-column: 1 / -1;
            padding: 20px;
        }

        .form-error {
            display: none;
            grid-column: 1 / -1;
            color: #ff6b6b;
            font-size: 0.95rem;
            margin-top: 10px;
            text-align: center;
        }

        @media (max-width: 650px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="form-wrapper">
        <div class="header-section">
            <h2>HI-Tech VILLAGE</h2>
            <p class="subtitle">Secure your real estate investment</p>
        </div>

        <form id="propertyForm" class="form-grid" novalidate>

            <div class="form-group">
                <input type="text" id="name" name="name" required minlength="3" pattern="^[A-Za-z\s]+$"
                    title="Name must contain only letters and spaces">
                <label>Full Name *</label>
            </div>

            <div class="form-group">
                <input type="tel" id="mobile" name="mobile" required pattern="^[0-9]{10}$" maxlength="10"
                    title="Please enter a valid 10-digit mobile number">
                <label>Mobile No. *</label>
            </div>

            <div class="form-group full-width">
                <textarea id="address" name="address" required minlength="10"></textarea>
                <label>Complete Address *</label>
            </div>

            <div class="form-group">
                <input type="number" id="plotNo" name="plotNo" required min="1" step="1"
                    title="Plot number must be an integer">
                <label>Plot No. *</label>
            </div>

            <div class="form-group">
                <input type="number" id="plotArea" name="plotArea" required min="1" step="0.01"
                    title="Plot area must be a valid number">
                <label>Plot Area (Sq. Ft.) *</label>
            </div>

            <div class="form-group">
                <input type="number" id="propertyRate" name="propertyRate" required min="1" step="1">
                <label>Property Rate (₹) *</label>
            </div>

            <div class="form-group">
                <input type="number" id="advanceAmount" name="advanceAmount" required min="0" step="1">
                <label>Advance Amount (₹) *</label>
            </div>

            <div class="form-group">
                <select id="paymentPlan" name="paymentPlan" required>
                    <option value="" disabled selected></option>
                    <option value="Lump Sum">Lump Sum (One-time)</option>
                    <option value="3 Months">Installments - 3 Months</option>
                    <option value="6 Months">Installments - 6 Months</option>
                </select>
                <label>Payment Schedule *</label>
            </div>

            <div class="form-group full-width">
                <input type="text" id="reference" name="reference" required pattern="^[A-Za-z0-9\s/-]+$"
                    title="Reference code or name may include letters, numbers, spaces, hyphens and slashes">
                <label>Reference Code / Name *</label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Securely</button>
            <div id="successMessage">Registration Confirmed.</div>
            <div id="formError" class="form-error"></div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

            tl.to(".form-wrapper", { opacity: 1, y: 0, duration: 1 })
                .to(".header-section", { opacity: 1, y: 0, duration: 0.6 }, "-=0.5")
                .to(".form-group", { opacity: 1, y: 0, duration: 0.5, stagger: 0.1 }, "-=0.3")
                .to(".submit-btn", { opacity: 1, duration: 0.5 }, "-=0.2");
        });

        const form = document.getElementById('propertyForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const formError = document.getElementById('formError');

        // ==========================================
        // REAL-TIME INPUT RESTRICTIONS
        // ==========================================

        // 1. Name: Only Letters and Spaces
        document.getElementById('name').addEventListener('input', function () {
            this.value = this.value.replace(/[^A-Za-z\s]/g, '');
        });

        // 2. Mobile: Only exact 10 digits
        document.getElementById('mobile').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        // 3. Integer Only Fields (Plot No, Rate, Advance) - blocks decimals and 'e'
        const integerFields = ['plotNo', 'propertyRate', 'advanceAmount'];
        integerFields.forEach(id => {
            document.getElementById(id).addEventListener('input', function () {
                this.value = this.value.replace(/\D/g, '');
            });
        });

        // 4. Plot Area: Numbers and ONLY one decimal point allowed
        document.getElementById('plotArea').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9.]/g, '');
            if ((this.value.match(/\./g) || []).length > 1) {
                this.value = this.value.slice(0, -1);
            }
        });

        // ==========================================

        function clearError() {
            formError.textContent = '';
            formError.style.display = 'none';
        }

        function showError(message) {
            formError.textContent = message;
            formError.style.display = 'block';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            clearError();
            successMessage.style.display = 'none';

            if (!form.checkValidity()) {
                form.reportValidity();
                submitBtn.innerText = 'Submit Securely';
                submitBtn.style.pointerEvents = 'auto';
                return;
            }

            // Extra JS validation check before sending
            const mobileVal = document.getElementById('mobile').value;
            if (mobileVal.length !== 10) {
                showError("Mobile number must be exactly 10 digits.");
                return;
            }

            submitBtn.innerText = 'Submitting...';
            submitBtn.style.pointerEvents = 'none';

            const formData = {
                name: document.getElementById('name').value.trim(),
                mobile: document.getElementById('mobile').value.replace(/\s+/g, ''),
                address: document.getElementById('address').value.trim(),
                plotNo: document.getElementById('plotNo').value.trim(),
                plotArea: document.getElementById('plotArea').value.trim(),
                propertyRate: document.getElementById('propertyRate').value,
                advanceAmount: document.getElementById('advanceAmount').value,
                paymentPlan: document.getElementById('paymentPlan').value,
                reference: document.getElementById('reference').value.trim()
            };

            try {
                const response = await fetch('/send-whatsapp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                let result = {};
                const text = await response.text();
                try {
                    result = text ? JSON.parse(text) : {};
                } catch (parseErr) {
                    console.warn('Server returned non-JSON or empty response:', parseErr, text);
                }

                if (!response.ok || !result.success) {
                    throw new Error((result && result.error) || 'Failed to send WhatsApp messages.');
                }

                successMessage.textContent = 'Registration confirmed. You will receive a WhatsApp confirmation shortly.';
                successMessage.style.display = 'block';
                form.reset();
                submitBtn.innerText = 'Submit Securely';
                submitBtn.style.pointerEvents = 'auto';
            } catch (error) {
                console.error('Transmission failed:', error);
                showError(error.message || 'Server error. Please try again.');
                submitBtn.innerText = 'Submit Securely';
                submitBtn.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>

</html>
